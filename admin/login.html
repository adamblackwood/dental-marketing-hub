<!-- admin/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Dental Hub</title>
    <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2 style="margin-bottom: 1.5rem; text-align: center;">Admin Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter admin password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem;">Login</button>
                <p id="loginError" style="color: var(--danger); display: none; margin-top: 1rem; text-align: center; font-size: 0.875rem;"></p>
            </form>
        </div>
    </div>
    <script src="/assets/js/dashboard.js"></script>
</body>
</html>
