<!-- admin/data-viewer.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw Data Viewer - Dental Hub</title>
    <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body id="dataViewerPage">

    <div class="header">
        <h1>Raw Data Viewer</h1>
        <div class="header-actions">
            <a href="/admin/dashboard.html" class="btn btn-ghost btn-sm">← Back to Dashboard</a>
            <button id="logoutBtnData" class="btn btn-danger btn-sm">Logout</button>
        </div>
    </div>

    <div class="data-viewer-layout">
        <div class="sidebar">
            <button class="sidebar-btn active" data-table="visitor_profiles">Visitor Profiles</button>
            <button class="sidebar-btn" data-table="acquisitions">Acquisitions</button>
            <button class="sidebar-btn" data-table="visits">Visits</button>
            <button class="sidebar-btn" data-table="sessions">Sessions</button>
            <button class="sidebar-btn" data-table="email_activities">Email Activities</button>
            <button class="sidebar-btn" data-table="events">Events</button>
        </div>

        <div class="main-content">
            <div class="pagination">
                <button id="prevBtn" class="btn btn-ghost btn-sm" disabled>← Previous</button>
                <span id="pageInfo">Page 1 of 1</span>
                <button id="nextBtn" class="btn btn-ghost btn-sm">Next →</button>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Edit Record</h2>
                <button class="modal-close" id="closeEditModal">&times;</button>
            </div>
            <form id="editForm">
                <div id="formFields"></div>
                <input type="hidden" id="editRecordId">
                <input type="hidden" id="editTableName">
                <input type="hidden" id="editPkName">
                <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 1rem; background-color: var(--success);">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="/assets/js/dashboard.js"></script>
</body>
</html>
