<!-- admin/dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Dental Hub</title>
    <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body id="dashboardPage">

    <div class="header">
        <h1>Dental Marketing Hub</h1>
        <div class="header-actions">
            <a href="/admin/data-viewer.html" class="btn btn-ghost btn-sm">Raw Data</a>
            <button id="logoutBtn" class="btn btn-danger btn-sm">Logout</button>
        </div>
    </div>

    <div class="container">
        <!-- KPIs -->
        <div class="kpi-grid">
            <div class="kpi-card">
                <h3>Total Visitors</h3>
                <div class="value" id="kpiVisitors">0</div>
            </div>
            <div class="kpi-card">
                <h3>Hot Leads</h3>
                <div class="value" id="kpiHotLeads" style="color: #ef4444;">0</div>
            </div>
            <div class="kpi-card">
                <h3>Conversions (Affiliate)</h3>
                <div class="value" id="kpiConversions" style="color: #10b981;">0</div>
            </div>
            <div class="kpi-card">
                <h3>Total Sessions</h3>
                <div class="value" id="kpiSessions">0</div>
            </div>
        </div>

        <!-- Visitors Table -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h2>Visitor Profiles</h2>
            <button id="addVisitorBtn" class="btn btn-primary btn-sm">+ Add Visitor</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>UID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Visits</th>
                        <th>Conv.</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="visitorsTableBody">
                    <tr><td colspan="7" style="text-align: center; padding: 2rem; color: var(--text-secondary);">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Visitor Modal -->
    <div class="modal-overlay" id="visitorModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="visitorModalTitle">Add Visitor</h2>
                <button class="modal-close" id="closeVisitorModal">&times;</button>
            </div>
            <form id="visitorForm">
                <input type="hidden" id="visitorUid">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="identified_name" class="form-input" placeholder="Dr. John Smith">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="identified_email" class="form-input" placeholder="dr.smith@clinic.com">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="phone_number" class="form-input" placeholder="+1234567890">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="lead_status" class="form-input">
                        <option value="cold">Cold</option>
                        <option value="warm">Warm</option>
                        <option value="hot">Hot</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Save Visitor</button>
            </form>
        </div>
    </div>

    <!-- Journey 360 Modal -->
    <div class="modal-overlay" id="journeyModal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h2>Customer Journey 360°</h2>
                <button class="modal-close" id="closeJourneyModal">&times;</button>
            </div>
            <div id="journeyContent" style="color: var(--text-secondary);">Select a visitor to view their journey.</div>
        </div>
    </div>

    <script src="/assets/js/dashboard.js"></script>
</body>
</html>
