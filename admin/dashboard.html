<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center | Dental Marketing Hub</title>
    <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body>

    <!-- Top Navigation Bar -->
    <header class="top-nav">
        <div class="brand">
            <span class="logo-icon">🦷</span>
            <div class="brand-text">
                <h1>DentalHub</h1>
                <p>Command Center</p>
            </div>
        </div>
        
        <div class="nav-controls">
            <!-- Date Filter -->
            <div class="control-group">
                <span class="control-label">Period:</span>
                <select id="date-filter" class="control-input">
                    <option value="1d">Today</option>
                    <option value="7d" selected>Last 7 Days</option>
                    <option value="30d">Last 30 Days</option>
                    <option value="all">All Time</option>
                </select>
            </div>

            <!-- The Famous Toggle Switch -->
            <div class="toggle-switch-container">
                <span class="toggle-label active" id="label-data">Data View</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="view-toggle">
                    <span class="slider"></span>
                </label>
                <span class="toggle-label" id="label-analytics">Analytics</span>
            </div>

            <button id="logout-btn" class="btn btn-danger-outline">Logout</button>
        </div>
    </header>

    <main class="main-container">
        
        <!-- Analytics View -->
        <div id="analytics-view" class="view-section hidden">
            <h2 class="section-title">Performance Analytics</h2>
            
            <!-- KPI Cards -->
            <div class="kpi-grid" id="kpi-container">
                <div class="kpi-card">
                    <div class="kpi-icon blue">👀</div>
                    <div class="kpi-info"><h3>Total Visits</h3><p id="kpi-visits">0</p></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon purple">👤</div>
                    <div class="kpi-info"><h3>Unique Visitors</h3><p id="kpi-visitors">0</p></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon green">📝</div>
                    <div class="kpi-info"><h3>Total Leads</h3><p id="kpi-leads">0</p></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon orange">🔥</div>
                    <div class="kpi-info"><h3>GHL Clicks</h3><p id="kpi-clicks">0</p></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon red">🚪</div>
                    <div class="kpi-info"><h3>Bounce Rate</h3><p id="kpi-bounce">0%</p></div>
                </div>
            </div>

            <!-- Charts & Sources Grid -->
            <div class="analytics-grid">
                <div class="card charts-area">
                    <!-- Chart rendered by JS -->
                </div>
                <div class="card sources-area" id="sources-container">
                    <!-- Sources rendered by JS -->
                </div>
            </div>
        </div>

        <!-- Data Management View -->
        <div id="data-view" class="view-section">
            <div class="data-header">
                <div class="tabs">
                    <button class="tab-btn active" data-target="visitors">Visitors</button>
                    <button class="tab-btn" data-target="sessions">Sessions</button>
                    <button class="tab-btn" data-target="events">Events</button>
                </div>
                <button class="btn btn-primary" id="add-new-btn">+ Add Visitor</button>
            </div>

            <div class="card table-card">
                <div class="table-wrapper">
                    <table id="data-table">
                        <thead id="table-head"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="pagination-wrapper" id="pagination-container"></div>
        </div>

    </main>

    <!-- Modal Overlay (For Edit, Delete, Add, and Journey) -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Action</h3>
                <button class="close-modal-btn" id="close-modal-btn">&times;</button>
            </div>
            <form id="modal-form">
                <div id="modal-fields" class="modal-fields"></div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-modal-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="confirm-modal-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/assets/js/dashboard.js"></script>
</body>
</html>
