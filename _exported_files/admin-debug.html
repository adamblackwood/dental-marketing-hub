<!-- admin/debug.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Debug V4 - Dental Hub</title>
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <style>
        .debug-header { display: flex; gap: 1rem; margin-bottom: 2rem; align-items: center; }
        .debug-input { flex: 1; padding: 0.75rem; font-size: 1rem; }
        .validation-grid { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 2rem; }
        .val-badge { padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; }
        .val-pass { background-color: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid #10b981; }
        .val-fail { background-color: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid #ef4444; }
        .section-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
        .data-row { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px dashed rgba(255,255,255,0.05); }
        .copy-btn { background-color: #4f46e5; padding: 0.75rem 2rem; font-size: 1rem; margin-top: 1rem; width: 100%; cursor:pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>System Debug & Verification (V4)</h1>
        <a href="/admin/dashboard.html" class="btn btn-ghost btn-sm">← Back to Dashboard</a>
    </div>

    <div class="container">
        <div class="debug-header">
            <input type="text" id="uidInput" class="form-input debug-input" placeholder="Enter UID (e.g., test-uid-1001)">
            <button id="fetchBtn" class="btn btn-primary">Analyze V4 Data</button>
        </div>

        <div class="validation-grid" id="validationBadges"></div>

        <div id="debugContent" style="display: none;">
            <div class="section-card"><h3 class="section-title">🧠 Profile</h3><div id="profileData"></div></div>
            <div class="section-card"><h3 class="section-title">🛤️ Journeys (Visits & Paths)</h3><div id="journeysData"></div></div>
            <div class="section-card"><h3 class="section-title">⚡ Commercial Events</h3><div id="eventsData"></div></div>
            
            <button id="copyBtn" class="btn copy-btn">📋 Copy AI Verification Report (JSON)</button>
            <div id="copyStatus" style="text-align: center; color: var(--success); margin-top: 0.5rem; display: none;">Copied!</div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/admin';
        let currentDebugData = null;

        async function checkAuth() {
            try {
                const res = await fetch(`${API_BASE}/auth`, { method: 'GET', credentials: 'include' });
                if (!res.ok) window.location.href = '/admin/login.html';
            } catch (e) { window.location.href = '/admin/login.html'; }
        }
        checkAuth();

        document.getElementById('fetchBtn').addEventListener('click', async () => {
            const uid = document.getElementById('uidInput').value.trim();
            if (!uid) return alert('Enter UID');
            document.getElementById('validationBadges').innerHTML = 'Analyzing...';
            document.getElementById('debugContent').style.display = 'none';

            try {
                const res = await fetch(`${API_BASE}/debug?uid=${uid}`, { credentials: 'include' });
                if (!res.ok) throw new Error('UID Not Found');
                currentDebugData = await res.json();
                runV4Analysis(currentDebugData);
            } catch (err) {
                document.getElementById('validationBadges').innerHTML = `<div class="val-badge val-fail">❌ ${err.message}</div>`;
            }
        });

        function runV4Analysis(data) {
            const badges = [];
            const p = data.profile;

            if (!p) { badges.push(b('fail', 'Profile Missing')); document.getElementById('validationBadges').innerHTML = badges.join(''); return; }
            badges.push(b('pass', 'Profile Exists'));

            // Check Bloat (Are there page_view in events?)
            const bloatEvents = data.events.filter(e => e.event_type === 'page_view' || e.event_type === 'scroll' || e.event_type === 'heartbeat');
            badges.push(bloatEvents.length === 0 ? b('pass', 'Zero Bloat (No Nav in Events)') : b('fail', `BLOAT DETECTED (${bloatEvents.length} Nav Events)`));

            // Check Journeys
            if (data.journeys && data.journeys.length > 0) badges.push(b('pass', `Journeys Recorded (${data.journeys.length})`));
            else badges.push(b('fail', 'No Journeys Recorded'));

            // Commercial Math
            const convEvents = data.events.filter(e => ['form_submit', 'file_download', 'affiliate_click'].includes(e.event_type)).length;
            badges.push(p.total_conversions === convEvents ? b('pass', `Conversions Math OK (${convEvents})`) : b('fail', `Mismatch (P:${p.total_conversions}, E:${convEvents})`));

            document.getElementById('validationBadges').innerHTML = badges.join('');
            renderV4UI(data);
        }

        function renderV4UI(data) {
            document.getElementById('debugContent').style.display = 'block';
            const p = data.profile;
            document.getElementById('profileData').innerHTML = `
                <div class="data-row"><span>Status:</span><span>${p.lead_status}</span></div>
                <div class="data-row"><span>Score:</span><span>${p.lead_score}</span></div>
                <div class="data-row"><span>Total Visits:</span><span>${p.total_visits}</span></div>
                <div class="data-row"><span>Conversions:</span><span>${p.total_conversions}</span></div>
            `;

            let jHtml = '';
            if (data.visits) {
                data.visits.forEach(v => {
                    const journeyObj = data.journeys.find(j => j.visit_id === v.visit_id);
                    const path = journeyObj ? journeyObj.journey.join(' → ') : 'No path recorded';
                    const evts = data.events.filter(e => e.visit_id === v.visit_id).map(e => `<span style="color:var(--accent)">${e.event_type}</span>`).join(', ');
                    
                    jHtml += `<div style="margin-bottom:1rem; padding:1rem; background:rgba(0,0,0,0.2); border-radius:6px;">
                        <strong>Visit started: ${new Date(v.started_at).toLocaleString()}</strong> (Bounce: ${v.is_bounce})<br>
                        <span style="color:#fcd34d">Path: ${path}</span><br>
                        ${evts ? 'Actions: ' + evts : ''}
                    </div>`;
                });
            }
            document.getElementById('journeysData').innerHTML = jHtml || 'None';
            document.getElementById('eventsData').innerHTML = data.events.map(e => `<div class="data-row"><span>${e.event_type}</span><span>${e.event_value || '-'}</span></div>`).join('') || 'None';
        }

        function b(type, text) { return `<div class="val-badge ${type === 'pass' ? 'val-pass' : 'val-fail'}">${type === 'pass' ? '✅' : '❌'} ${text}</div>`; }

        document.getElementById('copyBtn').addEventListener('click', () => {
            if (!currentDebugData) return;
            navigator.clipboard.writeText(JSON.stringify(currentDebugData, null, 2)).then(() => {
                const s = document.getElementById('copyStatus'); s.style.display = 'block'; setTimeout(() => s.style.display = 'none', 2000);
            });
        });
    </script>
</body>
</html>
